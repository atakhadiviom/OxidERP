<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>OxidERP</title>
  <style>
    :root{--purple:#714b67;--purple-dark:#52384b;--purple-soft:#f3edf2;--teal:#00a09d;--bg:#f6f7f8;--panel:#fff;--text:#1f2933;--muted:#6b7280;--line:#d8dadd;--green:#14854f;--orange:#f59e0b}*{box-sizing:border-box}body{margin:0;background:var(--bg);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Inter,Arial,sans-serif;color:var(--text)}.odoo{min-height:100vh}.topbar{height:48px;background:var(--purple);color:white;display:flex;align-items:center;gap:16px;padding:0 14px;box-shadow:0 1px 4px rgba(0,0,0,.14);position:sticky;top:0;z-index:10}.launcher{width:34px;height:34px;border-radius:8px;display:grid;grid-template-columns:repeat(3,1fr);gap:3px;padding:7px;background:rgba(255,255,255,.12);cursor:pointer}.launcher span{background:white;border-radius:2px}.brand{font-weight:700;font-size:18px;letter-spacing:.2px}.menu{display:flex;gap:4px;height:100%;align-items:center}.menu button{height:36px;border:0;background:transparent;color:#f7edf5;padding:0 12px;border-radius:6px;cursor:pointer;font-size:14px}.menu button.active,.menu button:hover{background:rgba(255,255,255,.16)}.spacer{flex:1}.user{display:flex;align-items:center;gap:9px;font-size:14px}.avatar{width:28px;height:28px;border-radius:50%;background:#fff;color:var(--purple);display:grid;place-items:center;font-weight:800}.page{padding:0}.control{min-height:82px;background:white;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;padding:14px 24px}.breadcrumbs{font-size:13px;color:var(--muted);margin-bottom:5px}.title{font-size:26px;font-weight:600}.actions{display:flex;gap:8px;align-items:center}.btn{border:1px solid transparent;background:var(--teal);color:white;border-radius:4px;padding:8px 12px;cursor:pointer;font-weight:600;font-size:14px}.btn.secondary{background:white;color:#374151;border-color:var(--line)}.btn.purple{background:var(--purple)}.search{height:34px;border:1px solid var(--line);border-radius:4px;padding:0 10px;min-width:260px}.content{padding:22px 24px}.app-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(185px,1fr));gap:22px}.app-card{background:white;border:1px solid #e6e6e6;border-radius:3px;min-height:178px;text-align:center;padding:22px 14px;cursor:pointer;box-shadow:0 1px 2px rgba(0,0,0,.05);transition:.12s}.app-card:hover{transform:translateY(-2px);box-shadow:0 6px 16px rgba(0,0,0,.12)}.app-icon{width:70px;height:70px;margin:0 auto 13px;border-radius:16px;background:linear-gradient(135deg,var(--purple),#9b6a90);display:grid;place-items:center;font-size:34px;color:white}.app-title{font-weight:650;font-size:17px}.app-desc{color:var(--muted);font-size:13px;line-height:1.35;margin-top:7px}.kanban{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:14px}.panel{background:white;border:1px solid var(--line);border-radius:3px;box-shadow:0 1px 2px rgba(0,0,0,.04)}.panel-head{padding:12px 14px;border-bottom:1px solid var(--line);font-weight:650;background:#fafafa;display:flex;justify-content:space-between}.record{margin:12px;border:1px solid var(--line);border-left:4px solid var(--purple);border-radius:3px;padding:12px;background:white}.record h4{margin:0 0 7px;font-size:15px}.record-row{font-size:13px;color:var(--muted);margin:4px 0}.table-wrap{background:white;border:1px solid var(--line);border-radius:3px;overflow:hidden}.table{width:100%;border-collapse:collapse;background:white}.table th{background:#f8f8f8;color:#374151;font-size:13px;font-weight:650}.table th,.table td{padding:10px 12px;border-bottom:1px solid var(--line);text-align:left}.table tr:hover td{background:#fcfcfc}.form-sheet{max-width:980px;margin:auto;background:white;border:1px solid var(--line);box-shadow:0 2px 8px rgba(0,0,0,.06)}.sheet-title{padding:22px 28px;border-bottom:1px solid var(--line);font-size:25px;font-weight:600}.form{display:grid;grid-template-columns:1fr 1fr;gap:14px 24px;padding:24px 28px}.field{display:grid;grid-template-columns:150px 1fr;align-items:center;gap:10px}.field label{font-size:13px;color:#374151}.field input,.field select{height:34px;border:0;border-bottom:1px solid #cfd4d9;padding:6px;background:#fff}.field input:focus,.field select:focus{outline:none;border-bottom-color:var(--purple)}.empty{padding:44px;text-align:center;color:var(--muted);background:white;border:1px dashed var(--line)}.badge{font-size:12px;padding:3px 7px;border-radius:999px;background:var(--purple-soft);color:var(--purple)}.status{color:var(--green);font-weight:650}.mobile-tabs{display:none}@media(max-width:760px){.menu{display:none}.search{display:none}.control{display:block}.actions{margin-top:12px;flex-wrap:wrap}.content{padding:14px}.form{grid-template-columns:1fr}.field{grid-template-columns:1fr}.topbar{gap:10px}.app-grid{grid-template-columns:repeat(2,1fr)}}
  </style>
</head>
<body>
<div class="odoo">
  <header class="topbar">
    <div class="launcher" onclick="dashboard()"><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span></div>
    <div class="brand">OxidERP</div>
    <nav class="menu" id="nav"></nav>
    <div class="spacer"></div>
    <input class="search" placeholder="Search..." oninput="state.query=this.value.toLowerCase(); rerender()" />
    <div class="user"><span id="tenant">demo-company</span><div class="avatar">A</div></div>
  </header>
  <section class="control">
    <div><div class="breadcrumbs" id="crumbs">Apps</div><div class="title" id="title">Apps</div><div class="muted" id="subtitle"></div></div>
    <div class="actions" id="actions"></div>
  </section>
  <main class="content" id="content"></main>
</div>
<script>
const state={modules:[],current:null,entity:null,records:{},tenant:null,query:''};
const api=async(url,options={})=>(await fetch(url,{headers:{'content-type':'application/json'},...options})).json();
const nav=document.getElementById('nav'),content=document.getElementById('content'),actions=document.getElementById('actions');
function setHeader(title,sub='',crumb='Apps'){document.getElementById('title').textContent=title;document.getElementById('subtitle').textContent=sub;document.getElementById('crumbs').textContent=crumb}
function drawNav(){nav.innerHTML=`<button class="${!state.current?'active':''}" onclick="dashboard()">Apps</button>`+state.modules.map(m=>`<button class="${state.current===m.name?'active':''}" onclick="openModule('${m.name}')">${m.title}</button>`).join('')+`<button class="${state.current==='events'?'active':''}" onclick="events()">Events</button>`}
function actionbar(html=''){actions.innerHTML=html}
async function load(){const data=await api('/api/modules');state.modules=data.modules.sort((a,b)=>a.title.localeCompare(b.title));state.tenant=data.tenant;document.getElementById('tenant').textContent=data.tenant.tenant_slug;dashboard()}
function dashboard(){state.current=null;state.entity=null;drawNav();setHeader('Apps','Choose a business app to start working.','OxidERP');actionbar(`<button class="btn purple" onclick="dashboard()">Update Apps List</button><button class="btn secondary" onclick="events()">Event Log</button>`);content.innerHTML=`<div class="app-grid">${state.modules.map(m=>`<div class="app-card" onclick="openModule('${m.name}')"><div class="app-icon">${m.icon}</div><div class="app-title">${m.title}</div><div class="app-desc">${m.summary}</div><p><span class="badge">Installed</span> <span class="status">v${m.version}</span></p></div>`).join('')}</div>`}
async function openModule(name){state.current=name;drawNav();const m=state.modules.find(x=>x.name===name);const e=m.entities[0];state.entity=e.name;const data=await api(`/api/entities/${name}/${e.name}`);state.records[`${name}.${e.name}`]=data.records;setHeader(e.title,m.summary,`Apps / ${m.title}`);actionbar(`<button class="btn" onclick="showForm('${name}','${e.name}')">Create</button><button class="btn secondary" onclick="openModule('${name}')">Refresh</button><button class="btn secondary" onclick="events()">Events</button>`);renderList(m,e,data.records)}
function filtered(rows,e){if(!state.query)return rows;return rows.filter(r=>e.fields.some(f=>String(r.data[f.name]??'').toLowerCase().includes(state.query)))}
function renderList(m,e,rows){rows=filtered(rows,e);if(!rows.length){content.innerHTML=`<div class="empty">No ${e.title.toLowerCase()} records. Click <b>Create</b> to add one.</div>`;return}if(m.name==='crm'){const stages=['new','qualified','proposal','won','lost'];content.innerHTML=`<div class="kanban">${stages.map(s=>`<div class="panel"><div class="panel-head"><span>${s.toUpperCase()}</span><span class="badge">${rows.filter(r=>(r.data.stage||'new')===s).length}</span></div>${rows.filter(r=>(r.data.stage||'new')===s).map(r=>recordCard(e,r)).join('')||'<div class="empty">Empty</div>'}</div>`).join('')}</div>`;return}content.innerHTML=`<div class="table-wrap"><table class="table"><thead><tr>${e.fields.slice(0,6).map(f=>`<th>${f.label}</th>`).join('')}</tr></thead><tbody>${rows.map(r=>`<tr>${e.fields.slice(0,6).map(f=>`<td>${r.data[f.name]??''}</td>`).join('')}</tr>`).join('')}</tbody></table></div>`}
function recordCard(e,r){return `<div class="record"><h4>${r.data.name||r.data.customer||r.data.sku||r.data.reference||'Record'}</h4>${e.fields.slice(1,5).map(f=>`<div class="record-row"><b>${f.label}:</b> ${r.data[f.name]??''}</div>`).join('')}</div>`}
function showForm(module,entityName){const m=state.modules.find(x=>x.name===module),e=m.entities.find(x=>x.name===entityName);setHeader(`New ${e.title}`,'Fill the fields and save.',`Apps / ${m.title} / New`);actionbar(`<button class="btn" onclick="saveEntity('${module}','${entityName}')">Save</button><button class="btn secondary" onclick="openModule('${module}')">Discard</button>`);content.innerHTML=`<div class="form-sheet"><div class="sheet-title">${e.title}</div><div class="form">${e.fields.map(fieldHtml).join('')}</div></div>`}
function fieldHtml(f){const req=f.required?'required':'';if(f.field_type==='select')return`<div class="field"><label>${f.label}</label><select id="f_${f.name}" ${req}>${f.options.map(o=>`<option value="${o}">${o}</option>`).join('')}</select></div>`;return`<div class="field"><label>${f.label}</label><input id="f_${f.name}" ${req} type="${f.field_type==='money'||f.field_type==='number'?'number':f.field_type==='date'?'date':'text'}" placeholder="${f.label}" /></div>`}
async function saveEntity(module,entityName){const m=state.modules.find(x=>x.name===module),e=m.entities.find(x=>x.name===entityName);const data={};e.fields.forEach(f=>data[f.name]=document.getElementById('f_'+f.name).value);await api(`/api/entities/${module}/${entityName}`,{method:'POST',body:JSON.stringify({data})});openModule(module)}
async function events(){state.current='events';drawNav();setHeader('Events','Technical log of module/entity events.','OxidERP / Events');actionbar(`<button class="btn secondary" onclick="events()">Refresh</button>`);const data=await api('/api/events');content.innerHTML=`<div class="table-wrap"><table class="table"><thead><tr><th>Topic</th><th>Module</th><th>Created</th></tr></thead><tbody>${data.events.map(e=>`<tr><td>${e.topic}</td><td>${e.module_name}</td><td>${new Date(e.created_at).toLocaleString()}</td></tr>`).join('')||'<tr><td colspan="3" class="empty">No events yet.</td></tr>'}</tbody></table></div>`}
function rerender(){if(!state.current)return dashboard();if(state.current==='events')return events();const m=state.modules.find(x=>x.name===state.current),e=m.entities[0];renderList(m,e,state.records[`${m.name}.${e.name}`]||[])}
load().catch(e=>{content.innerHTML='<pre>'+e.stack+'</pre>'});
</script>
</body>
</html>
