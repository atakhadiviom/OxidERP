services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: oxiderp
      POSTGRES_USER: oxiderp
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U oxiderp -d oxiderp"]
      interval: 10s
      timeout: 5s
      retries: 5

  oxiderp:
    build: .
    environment:
      DATABASE_URL: postgres://oxiderp:${POSTGRES_PASSWORD:-change_me}@postgres:5432/oxiderp
      OXIDERP_BIND: 0.0.0.0:8080
      RUST_LOG: info
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
